---
name: Integration tests

on:
  push:
    branches:
      - "master"
      - "release/**"
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "examples/**"
      - "hack/**"
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"
  pull_request:
    branches:
      - "master"
      - "release/**"
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "examples/**"
      - "hack/**"
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"
  workflow_dispatch:

jobs:
  ci_job:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test-integ
        shell: bash
